name: Generate Screenshots

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: puppeteer-chrome-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build HTML, PDF and screenshots
        run: node build.js

      - name: Upload HTML screenshot
        uses: actions/upload-artifact@v4
        with:
          name: html-screenshot
          path: screenshots/html-screenshot.png

      - name: Upload PDF screenshot
        uses: actions/upload-artifact@v4
        with:
          name: pdf-screenshot
          path: screenshots/pdf-screenshot.png
