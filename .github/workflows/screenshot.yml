name: Screenshot Preview

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start HTTP server
        run: |
          python3 -m http.server 8080 &
          # Wait until the server is actually accepting connections
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/ > /dev/null && break
            sleep 1
          done

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshots
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();

            // HTML (screen) screenshot
            const htmlPage = await browser.newPage();
            await htmlPage.setViewportSize({ width: 1920, height: 1080 });
            await htmlPage.goto('http://localhost:8080/index.html', { waitUntil: 'load', timeout: 30000 });
            await htmlPage.screenshot({ path: 'screenshot.png', fullPage: true });
            console.log('HTML screenshot taken');

            // PDF (print) screenshot
            const pdfPage = await browser.newPage();
            await pdfPage.setViewportSize({ width: 1920, height: 1080 });
            await pdfPage.goto('http://localhost:8080/index.html', { waitUntil: 'load', timeout: 30000 });
            await pdfPage.emulateMedia({ media: 'print' });
            await pdfPage.screenshot({ path: 'screenshot-pdf.png', fullPage: true });
            console.log('PDF screenshot taken');

            await browser.close();
          })().catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Push screenshots to screenshots branch
        id: store
        run: |
          HTML_FILE="run-${{ github.run_id }}-html.png"
          PDF_FILE="run-${{ github.run_id }}-pdf.png"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch screenshots branch if it exists
          git fetch origin screenshots 2>/dev/null || true

          # Create a worktree pointing at the screenshots branch (or a new orphan)
          if git show-ref --verify --quiet refs/remotes/origin/screenshots; then
            git worktree add /tmp/screenshots-worktree -b screenshots-ci origin/screenshots
          else
            git worktree add --orphan -b screenshots-ci /tmp/screenshots-worktree
          fi

          cp screenshot.png "/tmp/screenshots-worktree/$HTML_FILE"
          cp screenshot-pdf.png "/tmp/screenshots-worktree/$PDF_FILE"
          cd /tmp/screenshots-worktree
          git add "$HTML_FILE" "$PDF_FILE"
          git commit -m "Screenshots for run ${{ github.run_id }}"
          git push origin HEAD:screenshots

          echo "html_url=https://raw.githubusercontent.com/${{ github.repository }}/screenshots/$HTML_FILE" >> "$GITHUB_OUTPUT"
          echo "pdf_url=https://raw.githubusercontent.com/${{ github.repository }}/screenshots/$PDF_FILE" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const htmlUrl = '${{ steps.store.outputs.html_url }}';
            const pdfUrl = '${{ steps.store.outputs.pdf_url }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 📸 Screenshot Preview\n\n### HTML (screen)\n![HTML Preview](${htmlUrl})\n\n### PDF (print)\n![PDF Preview](${pdfUrl})\n\n*Generated by [run #${{ github.run_id }}](${runUrl})*`,
            });
